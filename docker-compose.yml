version: "3.9"

# ============================================================
# APEX BOT - Docker Compose
# Intel Core Ultra 5 225F | RTX 5060 | DDR5-32GB
# 로컬 PC 직접 실행 권장 (GPU 직접 접근)
# ============================================================

services:
  apex-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex_bot
    restart: unless-stopped
    environment:
      - UPBIT_ACCESS_KEY=${UPBIT_ACCESS_KEY}
      - UPBIT_SECRET_KEY=${UPBIT_SECRET_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./models/saved:/app/models/saved
      - ./config:/app/config:ro
    ports:
      - "8888:8888"     # 대시보드
    networks:
      - apex-network
    # GPU 지원 (RTX 5060)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis 캐시 (선택)
  redis:
    image: redis:7-alpine
    container_name: apex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - apex-network
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru

  # Prometheus 모니터링 (선택)
  prometheus:
    image: prom/prometheus:latest
    container_name: apex_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge

volumes:
  redis-data:
